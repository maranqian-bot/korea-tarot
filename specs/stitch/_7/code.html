<!DOCTYPE html>

<html class="dark" lang="ko"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>운세왕국 - 로그인</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,wght@0,400..900;1,400..900&amp;family=Be+Vietnam+Pro:wght@100..900&amp;family=Manrope:wght@200..800&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            display: inline-block;
            line-height: 1;
            text-transform: none;
            letter-spacing: normal;
            word-wrap: normal;
            white-space: nowrap;
            direction: ltr;
        }
        
        @keyframes flow-nebula {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .nebula-gradient {
            background: linear-gradient(-45deg, rgba(138, 43, 226, 0.15), rgba(72, 0, 129, 0.2), rgba(188, 19, 254, 0.1), rgba(18, 18, 34, 0.1));
            background-size: 400% 400%;
            animation: flow-nebula 15s ease infinite;
        }

        @keyframes float-particle {
            0%, 100% { transform: translateY(0) translateX(0) scale(1); opacity: 0.3; }
            50% { transform: translateY(-20px) translateX(10px) scale(1.2); opacity: 0.6; }
        }

        .particle {
            position: absolute;
            background: white;
            border-radius: 50%;
            filter: blur(1px);
            pointer-events: none;
            animation: float-particle var(--duration) infinite ease-in-out;
        }

        .glass-panel {
            backdrop-filter: blur(40px) saturate(180%);
            background: rgba(18, 18, 34, 0.65);
            border: 1px solid rgba(220, 184, 255, 0.25);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8), 
                        inset 0 0 15px rgba(220, 184, 255, 0.05);
        }

        .mystical-input:focus {
            box-shadow: 0 0 20px rgba(138, 43, 226, 0.4);
            border-color: rgba(220, 184, 255, 0.6);
            outline: none;
        }

        .text-glow {
            text-shadow: 0 0 15px rgba(220, 184, 255, 0.6);
        }

        .gradient-text {
            background: linear-gradient(135deg, #dcb8ff 0%, #ffaaf9 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .btn-mystical-glow {
            background: linear-gradient(135deg, #8a2be2 0%, #96049d 100%);
            position: relative;
            overflow: hidden;
        }

        .btn-mystical-glow::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.2) 0%, transparent 70%);
            transform: scale(0);
            transition: transform 0.6s ease-out;
        }

        .btn-mystical-glow:hover::after {
            transform: scale(1);
        }

        .social-btn {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(220, 184, 255, 0.15);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .social-btn:hover {
            background: rgba(220, 184, 255, 0.1);
            border-color: rgba(220, 184, 255, 0.5);
            transform: translateY(-5px) scale(1.1);
            box-shadow: 0 5px 15px rgba(138, 43, 226, 0.3);
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              "colors": {
                      "inverse-on-surface": "#2f2f40",
                      "surface-bright": "#38374a",
                      "secondary-container": "#96049d",
                      "inverse-surface": "#e3e0f8",
                      "primary-fixed": "#efdbff",
                      "secondary-fixed-dim": "#ffaaf9",
                      "surface-container-low": "#1a1a2b",
                      "surface-container-high": "#29283a",
                      "on-tertiary": "#2f3131",
                      "background": "#121222",
                      "surface-container": "#1e1e2f",
                      "surface-variant": "#333345",
                      "on-tertiary-fixed-variant": "#464747",
                      "on-secondary-fixed-variant": "#7f0086",
                      "tertiary-container": "#636464",
                      "on-primary-fixed": "#2c0051",
                      "on-primary": "#480081",
                      "primary-container": "#8a2be2",
                      "on-secondary-container": "#ffaff9",
                      "on-tertiary-fixed": "#1a1c1c",
                      "primary": "#dcb8ff",
                      "inverse-primary": "#8422dc",
                      "surface-container-lowest": "#0c0c1d",
                      "on-error": "#690005",
                      "error": "#ffb4ab",
                      "on-surface": "#e3e0f8",
                      "on-secondary": "#5a005f",
                      "error-container": "#93000a",
                      "secondary": "#ffaaf9",
                      "surface-dim": "#121222",
                      "on-surface-variant": "#cfc2d7",
                      "on-secondary-fixed": "#37003a",
                      "on-background": "#e3e0f8",
                      "outline": "#988ca0",
                      "tertiary-fixed-dim": "#c6c6c6",
                      "secondary-fixed": "#ffd6f8",
                      "on-error-container": "#ffdad6",
                      "surface-container-highest": "#333345",
                      "on-primary-container": "#eed9ff",
                      "on-primary-fixed-variant": "#6700b5",
                      "primary-fixed-dim": "#dcb8ff",
                      "surface-tint": "#dcb8ff",
                      "outline-variant": "#4c4354",
                      "surface": "#121222",
                      "tertiary": "#c6c6c6",
                      "tertiary-fixed": "#e3e2e2",
                      "on-tertiary-container": "#e2e1e1"
              },
              "borderRadius": {
                      "DEFAULT": "0.25rem",
                      "lg": "0.5rem",
                      "xl": "0.75rem",
                      "full": "9999px"
              },
              "spacing": {
                      "margin-edge": "4rem",
                      "container-max": "1440px",
                      "section-gap": "8rem",
                      "card-padding": "2.5rem",
                      "gutter": "2rem"
              },
              "fontFamily": {
                      "display-lg": ["Bodoni Moda"],
                      "headline-lg": ["Bodoni Moda"],
                      "label-sm": ["Manrope"],
                      "title-md": ["Be Vietnam Pro"],
                      "body-lg": ["Be Vietnam Pro"],
                      "headline-lg-mobile": ["Bodoni Moda"]
              },
              "fontSize": {
                      "display-lg": ["64px", {"lineHeight": "1.1", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                      "headline-lg": ["40px", {"lineHeight": "1.2", "fontWeight": "600"}],
                      "label-sm": ["12px", {"lineHeight": "1.2", "letterSpacing": "0.1em", "fontWeight": "600"}],
                      "title-md": ["20px", {"lineHeight": "1.5", "letterSpacing": "0.05em", "fontWeight": "500"}],
                      "body-lg": ["18px", {"lineHeight": "1.7", "fontWeight": "400"}],
                      "headline-lg-mobile": ["32px", {"lineHeight": "1.2", "fontWeight": "600"}]
              }
            },
          },
        }
    </script>
</head>
<body class="bg-background text-on-surface font-body-lg min-h-screen overflow-hidden flex flex-col items-center justify-center relative">
<!-- Background Cinematic Scene -->
<div class="fixed inset-0 z-0">
<img alt="Celestial Nebula" class="w-full h-full object-cover opacity-80" src="https://lh3.googleusercontent.com/aida/ADBb0ui1VPC97oK7cIsFFKFEJPOmGfUFE3zNjwuRkwwy215iO2ND3CrZCEv1YXtlQZT_L2FojACndiEqqwyyuKmrRrzVs2-6Mh_ciMNjgxbW1TXP-IX7e8B8lmm-6Ssu96TktiDgth4i5Frq7kCRSaACpdwC5c-QhjxydxibWppOFTsfnEhFMytjzX2G6T538OQjuTQ_sh9oII1gbg3AQ48arX20CUDCjObDrrnok53HeqPQ0Gs4dh2CoBS1fQ"/>
<div class="absolute inset-0 nebula-gradient"></div>
<div class="absolute inset-0 bg-gradient-to-b from-background/20 via-transparent to-background"></div>
<!-- Particles Container -->
<div class="absolute inset-0 overflow-hidden" id="particle-container">
<!-- JS will populate particles here -->
</div>
</div>
<!-- Login Container -->
<main class="relative z-10 w-full max-w-[520px] px-6 py-12">
<div class="glass-panel rounded-2xl p-8 md:p-12 transition-all duration-1000 ease-out transform translate-y-0 opacity-100" id="login-card">
<!-- Brand & Copy -->
<header class="text-center mb-10">
<h1 class="font-display-lg text-title-md font-bold tracking-[0.2em] mb-4">
<span class="gradient-text text-glow">운세왕국</span>
</h1>
<p class="font-headline-lg text-2xl md:text-3xl text-on-surface leading-tight font-semibold tracking-tight">
                운명의 영역으로<br/>
<span class="text-on-surface-variant/80">당신을 초대합니다</span>
</p>
<div class="w-20 h-[2px] bg-gradient-to-r from-transparent via-primary/50 to-transparent mx-auto mt-8"></div>
</header>
<!-- Form -->
<form class="flex flex-col gap-6 mb-10" onsubmit="event.preventDefault()">
<div class="flex flex-col gap-2">
<label class="font-label-sm text-xs text-primary/70 tracking-widest uppercase px-1" for="user-id">ID / Username</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-primary opacity-50 group-focus-within:opacity-100 transition-opacity">person</span>
<input class="w-full bg-surface-container-lowest/30 border border-outline-variant/20 rounded-xl py-4 pl-12 pr-4 text-on-surface placeholder:text-outline-variant/40 focus:border-primary/50 transition-all duration-300 mystical-input font-body-lg" id="user-id" placeholder="아이디를 입력하세요" type="text"/>
</div>
</div>
<div class="flex flex-col gap-2">
<label class="font-label-sm text-xs text-primary/70 tracking-widest uppercase px-1" for="password">Security Code</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-primary opacity-50 group-focus-within:opacity-100 transition-opacity">lock</span>
<input class="w-full bg-surface-container-lowest/30 border border-outline-variant/20 rounded-xl py-4 pl-12 pr-4 text-on-surface placeholder:text-outline-variant/40 focus:border-primary/50 transition-all duration-300 mystical-input font-body-lg" id="password" placeholder="비밀번호를 입력하세요" type="password"/>
</div>
</div>
<div class="flex justify-between items-center px-1">
<label class="flex items-center gap-2 cursor-pointer group">
<div class="relative flex items-center justify-center">
<input class="peer w-5 h-5 opacity-0 absolute cursor-pointer" type="checkbox"/>
<div class="w-5 h-5 border-2 border-outline-variant/40 rounded bg-surface-container/50 peer-checked:bg-primary-container peer-checked:border-primary transition-all"></div>
<span class="material-symbols-outlined absolute text-[14px] text-on-primary scale-0 peer-checked:scale-100 transition-transform">check</span>
</div>
<span class="font-label-sm text-sm text-on-surface-variant/80 group-hover:text-primary transition-colors">상태 유지</span>
</label>
<a class="font-label-sm text-sm text-primary hover:text-secondary transition-colors underline underline-offset-4 decoration-primary/20" href="#">정보 찾기</a>
</div>
<button class="w-full btn-mystical-glow text-on-primary font-bold text-lg py-5 rounded-xl hover:scale-[1.02] active:scale-95 transition-all duration-500 shadow-[0_15px_40px_rgba(138,43,226,0.4)] mt-4">
                시작하기
            </button>
</form>
<!-- Social Login -->
<div class="flex flex-col gap-8">
<div class="flex items-center gap-4">
<div class="h-[1px] flex-1 bg-gradient-to-r from-transparent to-outline-variant/20"></div>
<span class="font-label-sm text-xs text-on-surface-variant/60 tracking-widest uppercase">Quick Entrance</span>
<div class="h-[1px] flex-1 bg-gradient-to-l from-transparent to-outline-variant/20"></div>
</div>
<div class="flex justify-center gap-6">
<!-- Kakao -->
<button class="w-14 h-14 rounded-full social-btn flex items-center justify-center" title="Kakao Login">
<span class="material-symbols-outlined text-[#FEE500] fill-1 text-2xl">chat</span>
</button>
<!-- Naver -->
<button class="w-14 h-14 rounded-full social-btn flex items-center justify-center" title="Naver Login">
<span class="material-symbols-outlined text-[#03C75A] fill-1 text-2xl">circle_notifications</span>
</button>
<!-- Apple -->
<button class="w-14 h-14 rounded-full social-btn flex items-center justify-center" title="Apple Login">
<span class="material-symbols-outlined text-on-surface fill-1 text-2xl">brand_family</span>
</button>
</div>
</div>
<!-- Sign Up Link -->
<footer class="text-center mt-12">
<p class="font-body-lg text-sm text-on-surface-variant/70">
                처음 방문하셨나요? 
                <a class="text-primary font-bold hover:text-secondary transition-all ml-2 underline underline-offset-8 decoration-primary/30" href="#">초대장 받기</a>
</p>
</footer>
</div>
</main>
<script>
    document.addEventListener('DOMContentLoaded', () => {
        const card = document.getElementById('login-card');
        const particleContainer = document.getElementById('particle-container');
        
        // Create particles
        for(let i = 0; i < 40; i++) {
            const particle = document.createElement('div');
            particle.className = 'particle';
            const size = Math.random() * 3 + 1;
            const duration = 5 + Math.random() * 10;
            const delay = Math.random() * 5;
            
            particle.style.width = `${size}px`;
            particle.style.height = `${size}px`;
            particle.style.left = `${Math.random() * 100}%`;
            particle.style.top = `${Math.random() * 100}%`;
            particle.style.setProperty('--duration', `${duration}s`);
            particle.style.animationDelay = `${delay}s`;
            
            particleContainer.appendChild(particle);
        }

        // Mouse Parallax Effect
        document.addEventListener('mousemove', (e) => {
            const xAxis = (window.innerWidth / 2 - e.pageX) / 60;
            const yAxis = (window.innerHeight / 2 - e.pageY) / 60;
            
            card.style.transform = `rotateY(${xAxis}deg) rotateX(${yAxis}deg)`;
        });

        // Entrance Animation
        card.style.opacity = '0';
        card.style.transform = 'translateY(40px) perspective(1000px) rotateX(10deg)';
        setTimeout(() => {
            card.style.transition = 'all 1.5s cubic-bezier(0.16, 1, 0.3, 1)';
            card.style.opacity = '1';
            card.style.transform = 'translateY(0) perspective(1000px) rotateX(0)';
        }, 300);

        // Input Focus Animations
        const inputs = document.querySelectorAll('.mystical-input');
        inputs.forEach(input => {
            input.addEventListener('focus', () => {
                const icon = input.parentElement.querySelector('.material-symbols-outlined');
                icon.style.filter = 'drop-shadow(0 0 8px rgba(220,184,255,0.8))';
            });
            input.addEventListener('blur', () => {
                const icon = input.parentElement.querySelector('.material-symbols-outlined');
                icon.style.filter = 'none';
            });
        });
    });
</script>
</body></html>
